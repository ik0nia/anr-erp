name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='config.php' --exclude='vendor/' --exclude='uploads/' --exclude='logs/' --exclude='node_modules/' --exclude='error_log'
          path: ./
          remote_path: /home/anrbihor/web/erp.anrbihor.ro/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install composer dependencies
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/anrbihor/web/erp.anrbihor.ro/public_html
            composer install --no-dev --no-interaction 2>&1 || true
